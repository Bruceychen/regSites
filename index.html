<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 研蘋果工作坊 ｜ 報名</title>
  <meta name="description" content="2026 研蘋果工作坊線上報名" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" role="main">
    <header class="hero">
      <div class="badge">🍎 2026</div>
      <h1>研蘋果工作坊</h1>
      <p class="subtitle">一場關於探索與動手做的下午。歡迎報名，名額有限。</p>
    </header>

    <form id="reg-form" novalidate>
      <div class="field">
        <label for="name">姓名 <span class="req">*</span></label>
        <input id="name" name="name" type="text" autocomplete="name" required placeholder="王小明" />
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
      </div>

      <div class="field">
        <label for="phone">電話 <span class="req">*</span></label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" required placeholder="0912-345-678" />
      </div>

      <div class="field">
        <label for="org">組織 <span class="req">*</span></label>
        <input id="org" name="org" type="text" autocomplete="organization" required placeholder="○○公司 / ○○大學" />
      </div>

      <div class="field">
        <label for="title">職稱 <span class="req">*</span></label>
        <input id="title" name="title" type="text" autocomplete="organization-title" required placeholder="工程師 / 學生 / 設計師" />
      </div>

      <button type="submit" id="submit-btn" class="btn">送出報名</button>

      <p id="status-msg" class="status" role="status" aria-live="polite"></p>
    </form>

    <footer class="foot">
      <span>© 2026 研蘋果工作坊</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
